<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Aura{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── TEMA PADRÃO: Aura (violeta protetor) ── */
    :root {
      --primary-900: #2e1065;
      --primary-700: #6d28d9;
      --primary-600: #7c3aed;
      --primary-400: #a78bfa;
      --primary-100: #ede9fe;
      --primary-50:  #f5f3ff;

      --accent:      #0ea5e9;
      --accent-light:#e0f2fe;

      --green-600:   #059669;
      --green-100:   #d1fae5;
      --yellow-600:  #d97706;
      --yellow-100:  #fef3c7;
      --red-600:     #dc2626;
      --red-100:     #fee2e2;

      --gray-900:    #111827;
      --gray-600:    #4b5563;
      --gray-400:    #9ca3af;
      --gray-200:    #e5e7eb;
      --gray-100:    #f3f4f6;

      --nav-bg:      #2e1065;
      --nav-text:    #c4b5fd;
      --nav-hover:   #ffffff;

      --radius:      12px;
      --shadow:      0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    }

    /* ── TEMA PITAYA ── */
    [data-theme="pitaya"] {
      --primary-900: #4a0035;
      --primary-700: #c2185b;
      --primary-600: #e91e8c;
      --primary-400: #f472b6;
      --primary-100: #fce7f3;
      --primary-50:  #fdf2f8;

      --accent:      #84cc16;
      --accent-light:#ecfccb;

      --nav-bg:      #2d0022;
      --nav-text:    #f9a8d4;
      --nav-hover:   #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--nav-bg);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .nav-logo {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 800;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .5rem;
      letter-spacing: -.5px;
    }
    .nav-logo .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--primary-600);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .nav-user { color: var(--nav-text); font-size: .875rem; display: flex; align-items: center; gap: 1.25rem; }
    .nav-user a { color: var(--nav-text); text-decoration: none; transition: color .15s; }
    .nav-user a:hover { color: var(--nav-hover); }

    /* THEME SWITCHER */
    .theme-switcher { display: flex; gap: .4rem; align-items: center; }
    .theme-btn {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: border .2s; flex-shrink: 0;
    }
    .theme-btn:hover { border-color: rgba(255,255,255,.6); }
    .theme-btn.active { border-color: #fff; }
    .theme-btn-aura   { background: linear-gradient(135deg, #7c3aed, #0ea5e9); }
    .theme-btn-pitaya { background: linear-gradient(135deg, #e91e8c, #84cc16); }

    /* LAYOUT */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

    /* CARDS */
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; background: var(--primary-100); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .6rem 1.25rem; border-radius: 8px; font-size: .875rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: opacity .15s, transform .1s; }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn-primary   { background: var(--primary-600); color: #fff; }
    .btn-secondary { background: var(--gray-200); color: var(--gray-900); }
    .btn-full { width: 100%; justify-content: center; padding: .875rem; font-size: 1rem; border-radius: 10px; }

    /* BADGES */
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 700; }
    .badge-safe      { background: var(--green-100); color: var(--green-600); }
    .badge-attention { background: var(--yellow-100); color: var(--yellow-600); }
    .badge-high_risk { background: var(--red-100); color: var(--red-600); }

    /* PAGE HEADER */
    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary-900); }
    .page-header p  { color: var(--gray-600); margin-top: .35rem; font-size: .9rem; }
    .back-link { display: inline-flex; align-items: center; gap: .4rem; color: var(--primary-600); text-decoration: none; font-size: .875rem; font-weight: 600; margin-bottom: 1rem; }
    .back-link:hover { text-decoration: underline; }

    /* GRADIENT HERO */
    .gradient-bar {
      background: linear-gradient(135deg, var(--primary-900), var(--primary-600));
      border-radius: var(--radius);
      padding: 1.5rem;
      color: #fff;
      margin-bottom: 1.5rem;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
<nav>
  <a class="nav-logo" href="{% url 'dashboard:home' %}">
    <div class="logo-icon">✦</div>
    Aura
  </a>
  <div class="nav-user">
    <div class="theme-switcher">
      <button class="theme-btn theme-btn-aura active"   onclick="setTheme('aura')"   title="Tema Aura"></button>
      <button class="theme-btn theme-btn-pitaya"        onclick="setTheme('pitaya')" title="Tema Pitaya"></button>
    </div>
    <span>{{ user.email }}</span>
    <a href="{% url 'dashboard:api_docs' %}">API Docs</a>
    <a href="{% url 'dashboard:logout' %}">Sair</a>
  </div>
</nav>
{% endif %}

<div class="container">
  {% block content %}{% endblock %}
</div>

<script>
  function setTheme(name) {
    document.documentElement.setAttribute('data-theme', name === 'pitaya' ? 'pitaya' : '');
    localStorage.setItem('aura-theme', name);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.theme-btn-' + name).classList.add('active');
  }
  const saved = localStorage.getItem('aura-theme');
  if (saved) setTheme(saved);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
